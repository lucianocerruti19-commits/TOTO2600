<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TOTO BAR</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="banner">
  <h1 class="logo">TOTO BAR</h1>
</div>

<div class="home">
  <h2>Secciones</h2>

  <div class="paneles">
    <button onclick="mostrar('pizzas')">Pizzas</button>
    <button onclick="mostrar('milanesas')">Milanesas</button>
    <button onclick="mostrar('bebidas')">Bebidas</button>
    <button onclick="mostrar('papas')">Papas</button>
  </div>

  <div id="contenido"></div>
</div>

<script type="module">
import { db } from "./firebase.js";
import {
  getDocs,
  collection,
  query,
  where,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

let carrito = [];

window.mostrar = async function(categoria) {
  const snap = await getDocs(query(collection(db, "productos"), where("categoria", "==", categoria)));
  const div = document.getElementById("contenido");

  div.innerHTML = `<h2>${categoria}</h2>`;

  snap.forEach(doc => {
    const p = doc.data();
    div.innerHTML += `
      <div class="card">
        ${p.nombre} - $${p.precio}
        <button onclick="agregar('${p.nombre}', ${p.precio})">Agregar</button>
      </div>
    `;
  });

  renderCarrito();
};

window.agregar = function(nombre, precio) {
  carrito.push({ nombre, precio });
  renderCarrito();
};

function renderCarrito() {
  const div = document.getElementById("contenido");
  div.innerHTML += `
    <div class="carrito">
      <h3>Carrito</h3>
      ${carrito.map(p => `<div>${p.nombre} - $${p.precio}</div>`).join("")}
      <input id="mesa" type="number" placeholder="Número de mesa">
      <button onclick="enviar()">Enviar pedido</button>
    </div>
  `;
}

window.enviar = async function() {
  const mesa = document.getElementById("mesa").value;
  if (!mesa) return alert("Ingresá mesa");

  await addDoc(collection(db, "pedidos"), {
    mesa,
    items: carrito,
    estado: "pendiente",
    createdAt: serverTimestamp()
  });

  carrito = [];
  alert("Pedido enviado");
};
</script>

</body>
</html>
